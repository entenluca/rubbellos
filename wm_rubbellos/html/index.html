<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WM Rubbellos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Archivo+Black&family=Inter:wght@500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="app" class="hidden">
        <div class="scratch-card">

            <!-- Perforierte Kartenkante oben -->
            <div class="card-perforation card-perforation-top"></div>

            <header class="card-header">
                <div class="card-header-top">
                    <span class="card-serial" id="card-serial">Nr. 0000000</span>
                    <div class="header-actions">
                        <button id="btn-prizes" class="btn-card btn-card-ghost">
                            <span id="ui-prizes-label">Gewinne</span>
                        </button>
                        <button id="btn-close" class="btn-card btn-card-close">
                            <span id="ui-close-label">Schließen</span>
                        </button>
                    </div>
                </div>

                <div class="card-banner">
                    <div class="card-banner-stripe"></div>
                    <h1 id="ui-title">RUBBELLOS</h1>
                    <p id="ui-rules">Finde 3 gleiche Symbole und gewinne!</p>
                </div>

                <p class="card-instruction">
                    <b id="ui-brand">Rubbellos</b> – <span id="ui-sub">Kratze die silbernen Felder frei</span>
                </p>
            </header>

            <div id="prizes-panel" class="prizes-panel hidden">
                <h3 id="ui-prizes-header">Mögliche Gewinne</h3>
                <ul id="prizes-list"></ul>
            </div>

            <div class="card-play-area">
                <div class="play-label">SPIELFELD</div>
                <main class="grid" id="grid"></main>
            </div>

            <footer class="card-footer">
                <span class="card-legal">Glücksspiel nur Ingame · Kein Echtgeld</span>
                <button id="btn-reveal" class="btn-reveal">ALLES FREIRUBBELN</button>
            </footer>

            <div class="card-perforation card-perforation-bottom"></div>

            <div id="result" class="result hidden">
                <div class="result-content">
                    <div id="result-emoji" class="result-emoji">😞</div>
                    <span id="result-tagline" class="result-tagline"></span>
                    <h2 id="result-title" class="result-title"></h2>
                    <p id="result-sub" class="result-sub"></p>
                    <button id="btn-continue" class="btn-continue">
                        <span id="ui-continue-label">WEITER</span>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
